<div class="login-container">
  <div class="login-card">
    <!-- Logo y título -->
    <div class="brand-section">
      <div class="logo">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 4c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2zm0 13c-2.33 0-4.31-1.46-5.11-3.5h10.22c-.8 2.04-2.78 3.5-5.11 3.5z" fill="#0A6E5E"/>
        </svg>
        <span class="logo-text">MEDITEK</span>
      </div>
      <h1 class="title">Bienvenido</h1>
      <p class="subtitle">Sistema de Gestión Hospitalaria</p>
    </div>

    <!-- Botón Google -->
    <button class="btn-google" (click)="loginWithGoogle()" [disabled]="isLoading">
      <svg width="22" height="22" viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      <span *ngIf="!isLoading">Continuar con Google</span>
      <span *ngIf="isLoading" class="spinner"></span>
    </button>

    <!-- Mensaje de error -->
    <div *ngIf="errorMessage" class="error-message">
      <span class="error-icon">⚠️</span>
      {{ errorMessage }}
    </div>

    <!-- Footer -->
    <div class="footer">
      <p>© 2026 MEDITEK - Sistema de Gestión Hospitalaria</p>
    </div>
  </div>
</div>

<!-- Modal para completar perfil (primer registro) -->
<div class="modal" *ngIf="showProfileModal" (click)="closeModalOnBackdrop($event)">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Completa tu perfil</h3>
      <button class="close-btn" (click)="closeProfileModal()">×</button>
    </div>
    <div class="modal-body">
      <p>Por favor completa la siguiente información para continuar</p>
      
      <div class="form-group">
        <label for="dni">DNI / Documento de Identidad</label>
        <input 
          type="text" 
          id="dni" 
          [(ngModel)]="profileData.dni"
          class="form-control"
          placeholder="Ej: 12345678"
          maxlength="12"
          required>
      </div>

      <div class="form-group">
        <label for="age">Edad</label>
        <input 
          type="number" 
          id="age" 
          [(ngModel)]="profileData.age"
          class="form-control"
          placeholder="Ej: 30"
          min="0"
          max="120"
          required>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" (click)="closeProfileModal()">Cancelar</button>
      <button class="btn-primary" (click)="completeProfile()" [disabled]="isSaving">
        <span *ngIf="!isSaving">Guardar</span>
        <span *ngIf="isSaving" class="spinner-small"></span>
      </button>
    </div>
  </div>
</div>
